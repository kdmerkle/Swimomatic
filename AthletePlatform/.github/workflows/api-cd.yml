name: API CI/CD

on:
  push:
    branches: [main]
    paths:
      - 'AthletePlatformAPI/**'
      - 'Platform.Core/**'
      - 'Platform.Infrastructure/**'
      - 'SwimDomain/**'
      - 'TrackField.Domain/**'
      - '.github/workflows/api-cd.yml'

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.x'
      - name: Restore
        run: dotnet restore AthletePlatform.sln
      - name: Build
        run: dotnet build AthletePlatform.sln --no-restore -c Release
      - name: Test
        run: dotnet test AthletePlatform.sln --no-build -c Release --logger trx
      - name: Publish
        run: dotnet publish AthletePlatformAPI/AthletePlatformAPI.csproj -c Release -o ./publish
      - name: Deploy to App Service
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ vars.AZURE_APP_SERVICE_NAME }}
          publish-profile: ${{ secrets.AZURE_APP_SERVICE_PUBLISH_PROFILE }}
          package: './publish'
